[theme]
primaryColor = "#0A2540"         # Premium deep navy for primary buttons, sliders, and highlights
backgroundColor = "#F8FAFC"      # Clean slate white/light gray background (easier on the eyes)
secondaryBackgroundColor = "#FFFFFF" # Crisp white for the sidebar and form cards to create depth
textColor = "#1E293B"            # Slate charcoal for highly legible typography
font = "sans serif"              # Clean, modern sans-serif geometric font stack
